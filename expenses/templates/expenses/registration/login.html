<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Expense Tracker</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* A sleek, modern gradient background */
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* The floating card design */
        .login-card { 
            max-width: 420px; 
            width: 100%; 
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            background: rgba(255, 255, 255, 0.95); /* Slightly transparent white */
            backdrop-filter: blur(10px);
        }

        /* Fun hover effect for the card */
        .login-card:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }
        
        /* Clean inputs */
        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin-bottom: 20px; 
            border: 1px solid #ced4da; 
            border-radius: 10px; 
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
            outline: none;
            background-color: #fff;
        }

        label { 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #495057; 
            display: block; 
        }

        /* Custom Button Styling */
        .btn-custom {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            color: white;
            border-radius: 10px;
            transition: opacity 0.3s ease;
        }

        .btn-custom:hover {
            opacity: 0.9;
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card animate__animated animate__bounceInDown">
        
        <div class="text-center mb-4 animate__animated animate__fadeIn" style="animation-delay: 0.5s;">
            <div class="display-1 mb-3">💸</div>
            <h2 class="fw-bold text-dark">Welcome Back!</h2>
            <p class="text-muted">Log in to manage your budget.</p>
        </div>

        <form method="POST" class="animate__animated animate__fadeInUp" style="animation-delay: 0.7s;">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-custom w-100 py-3 mt-3 fw-bold fs-5 shadow-sm">
                Secure Log In
            </button>
        </form>

        <div class="text-center mt-4 animate__animated animate__fadeIn" style="animation-delay: 1s;">
            <small class="text-muted mb-0">Don't have an account? <a href="#">Sign up</a></small>
        </div>
    </div>

</body>
</html>
