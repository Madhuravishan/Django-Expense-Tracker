<!DOCTYPE html>
<html>
<head>
    <title>Login - Expense Tracker</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 20px; background-color: #f4f4f9; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 90%; margin-bottom: 10px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
        ul { list-style: none; padding: 0; color: red; font-size: 14px; } /* For error messages */
    </style>
</head>
<body>

    <h2>🔒 Welcome Back</h2>
    <p>Please log in to view your wallet.</p>

    <div class="box">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>
    </div>

</body>
</html>
