<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .auth-card { 
            max-width: 450px; 
            width: 100%; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 4px solid #764ba2;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px;
            margin-bottom: 15px; 
            border: 1px solid #ced4da; 
            border-radius: 12px; 
            background-color: #f8f9fa;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        input:focus {
            border-color: #667eea;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.2);
        }

        .helptext {
            display: block;
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: -12px;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        label { 
            font-weight: 600; 
            color: #495057;
            display: block;
            margin-top: 5px;
        }

        .btn-gradient {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
            opacity: 0.95;
        }

        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card animate__animated animate__zoomIn">
        
        <div class="text-center mb-4">
            <div class="display-3 mb-2 animate__animated animate__bounceIn" style="animation-delay: 0.3s;">📝</div>
            <h2 class="fw-bold text-dark mb-1">Create Account</h2>
            <p class="text-muted">Sign up to start tracking your budget</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn-gradient mt-2">Create Account</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
        </div>
    </div>

</body>
</html>
