<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .signup-card { 
            max-width: 450px; 
            width: 100%; 
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            margin: 20px;
        }

        input { 
            width: 100%; 
            padding: 10px 15px; 
            margin-bottom: 15px; 
            border: 1px solid #ced4da; 
            border-radius: 10px; 
            background-color: #f8f9fa;
        }
        
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
            outline: none;
        }

        ul.errorlist {
            color: #dc3545;
            list-style-type: none;
            padding: 0;
            font-size: 0.875em;
        }

        .helptext {
            font-size: 0.8em;
            color: #6c757d;
            display: block;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="signup-card animate__animated animate__zoomIn">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Create Account</h2>
            <p class="text-muted">Join to manage your budget securely.</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn w-100 py-3 mt-3 fw-bold fs-5 shadow-sm" style="background: linear-gradient(to right, #667eea, #764ba2); color: white; border-radius: 10px;">
                Sign Up
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">Already have an account? <a href="{% url 'login' %}" style="text-decoration: none; font-weight: bold; color: #667eea;">Log in</a></small>
        </div>
    </div>

</body>
</html>
